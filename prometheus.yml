# Prometheus scrape configuration for LLM Proxy
# Use with Docker Compose to scrape metrics from proxy endpoint

global:
  scrape_interval: 15s          # How often to scrape metrics
  evaluation_interval: 15s      # How often to evaluate alert rules

scrape_configs:
  # Scrape Prometheus itself for self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    
  # Scrape LLM Proxy /metrics endpoint
  - job_name: 'llm-proxy'
    scrape_interval: 15s
    scrape_timeout: 10s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['proxy:9999']
    
  # Optional: Node exporter for hardware metrics (uncomment if using)
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['node-exporter:9100']

rule_files:
  - '/etc/prometheus/rules/*.yml'
