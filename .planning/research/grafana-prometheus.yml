# prometheus.yml - Prometheus scrape configuration for LLM Proxy monitoring
# Place in /etc/prometheus/ or mount via volume in docker-compose

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'llm_proxy'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['proxy:8080']
        labels:
          app: 'llm-proxy'
          env: 'production'

# Alerting rules (optional - can be separate file)
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  # - alerts.yml
