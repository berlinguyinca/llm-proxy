groups:
  - name: llm_proxy_alerts
    interval: 30s
    rules:
      # High error rate (4xx/5xx)
      - alert: HighErrorRate
        expr: |
          sum(rate(proxy_requests_total[5m])) by (status_code) / 
          sum(rate(proxy_requests_total[5m])) * 100 > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is above 10% for the last 5 minutes"

      # Rate limiting triggered too often
      - alert: HighRateLimiting
        expr: |
          sum(rate(proxy_requests_total[5m])) by (status_code) == 429 > 100
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High rate limiting triggered"
          description: "More than 100 requests per second are being rate limited"

      # High latency p95
      - alert: HighLatency
        expr: histogram_quantile(0.95, sum(rate(proxy_request_duration_seconds_bucket[5m])) by (le)) > 5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High p95 latency detected"
          description: "95th percentile latency is above 5 seconds"

      # Too many active connections
      - alert: HighConnections
        expr: proxy_active_connections > 800
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High number of active connections"
          description: "Active connections exceed 800"

      # Memory pressure (assuming process_resident_memory_bytes exists)
      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes / 1e6 > 1.5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage detected"
          description: "Process memory exceeds 1.5GB"

      # High request rate (potential overload)
      - alert: HighRequestRate
        expr: sum(rate(proxy_requests_total[1m])) > 1000
        for: 1m
        labels:
          severity: info
        annotations:
          summary: "High request rate"
          description: "More than 1000 requests per minute detected"

